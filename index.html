<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PMS — Evansen Co Living</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f4f5f7;
      --surface: #ffffff;
      --border: #e5e7eb;
      --border-light: #f0f1f3;
      --text-primary: #111827;
      --text-secondary: #6b7280;
      --text-muted: #9ca3af;
      --accent: #111827;
      --accent-hover: #374151;
      --green-bg: #d1fae5;
      --green-text: #065f46;
      --red-bg: #fee2e2;
      --red-text: #991b1b;
      --sidebar-width: 64px;
      --header-height: 64px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text-primary);
      font-size: 14px;
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── SIDEBAR ── */
    .sidebar {
      width: var(--sidebar-width);
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px 0;
      gap: 4px;
      z-index: 10;
      flex-shrink: 0;
    }

    .sidebar-logo {
      width: 36px;
      height: 36px;
      background: var(--accent);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    .sidebar-logo svg { color: #fff; }

    .nav-item {
      width: 44px;
      height: 44px;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: var(--text-muted);
      transition: all 0.15s;
      position: relative;
      border: none;
      background: none;
    }
    .nav-item:hover {
      background: var(--bg);
      color: var(--text-primary);
    }
    .nav-item.active {
      background: var(--accent);
      color: #fff;
    }
    .nav-item .tooltip {
      position: absolute;
      left: calc(100% + 12px);
      background: var(--accent);
      color: #fff;
      font-size: 12px;
      font-weight: 500;
      padding: 5px 10px;
      border-radius: 6px;
      white-space: nowrap;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.15s;
      z-index: 100;
    }
    .nav-item .tooltip::before {
      content: '';
      position: absolute;
      right: 100%;
      top: 50%;
      transform: translateY(-50%);
      border: 5px solid transparent;
      border-right-color: var(--accent);
    }
    .nav-item:hover .tooltip { opacity: 1; }

    .sidebar-spacer { flex: 1; }

    /* ── MAIN LAYOUT ── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOPBAR ── */
    .topbar {
      height: var(--header-height);
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 28px;
      gap: 16px;
      flex-shrink: 0;
    }
    .topbar-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--text-primary);
      flex: 1;
    }
    .topbar-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 1px;
    }

    /* ── PAGE CONTENT ── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 28px;
    }

    .page { display: none; }
    .page.active { display: block; }

    /* ── SEARCH & FILTERS BAR ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }
    .search-box {
      position: relative;
      flex: 1;
      max-width: 320px;
    }
    .search-box svg {
      position: absolute;
      left: 11px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      pointer-events: none;
    }
    .search-box input {
      width: 100%;
      padding: 9px 12px 9px 34px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      background: var(--surface);
      color: var(--text-primary);
      outline: none;
      transition: border 0.15s;
    }
    .search-box input:focus { border-color: var(--accent); }
    .search-box input::placeholder { color: var(--text-muted); }

    .filter-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .filter-btn:hover { border-color: var(--accent); color: var(--text-primary); }
    .filter-btn svg { flex-shrink: 0; }

    .toolbar-spacer { flex: 1; }

    .btn-primary {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 9px 16px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-primary:hover { background: var(--accent-hover); }

    /* ── TABLE ── */
    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .table-wrapper { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead tr {
      background: #f9fafb;
      border-bottom: 1px solid var(--border);
    }
    th {
      padding: 11px 16px;
      text-align: left;
      font-size: 11.5px;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      white-space: nowrap;
      user-select: none;
    }
    th.sortable { cursor: pointer; }
    th.sortable:hover { color: var(--text-primary); }

    td {
      padding: 12px 16px;
      border-top: 1px solid var(--border-light);
      font-size: 13px;
      white-space: nowrap;
      color: var(--text-primary);
    }
    td.mono {
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      color: var(--text-secondary);
    }
    tr:hover td { background: #fafbfc; }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      font-family: 'DM Sans', sans-serif;
    }
    .status-pill::before {
      content: '';
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }
    .status-new {
      background: var(--green-bg);
      color: var(--green-text);
    }
    .status-new::before { background: #10b981; }
    .status-cancelled {
      background: var(--red-bg);
      color: var(--red-text);
    }
    .status-cancelled::before { background: #ef4444; }

    .status-select {
      appearance: none;
      border: none;
      outline: none;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
    }

    .table-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      font-size: 12.5px;
      color: var(--text-secondary);
    }
    .pagination {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .page-btn {
      width: 30px;
      height: 30px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 12px;
      color: var(--text-secondary);
      transition: all 0.15s;
    }
    .page-btn:hover { border-color: var(--accent); color: var(--text-primary); }
    .page-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
    .page-btn:disabled { opacity: 0.4; cursor: default; }

    /* ── SETTINGS PAGE ── */
    .settings-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
    }
    .settings-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }
    .settings-card-header {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .settings-card-header h3 {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .settings-card-body { padding: 8px 0; }
    .settings-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 20px;
      transition: background 0.1s;
    }
    .settings-item:hover { background: #fafbfc; }
    .settings-item span {
      font-size: 13.5px;
      color: var(--text-primary);
    }
    .remove-btn {
      width: 26px;
      height: 26px;
      border-radius: 6px;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-size: 13px;
    }
    .remove-btn:hover { background: var(--red-bg); color: var(--red-text); }
    .settings-add {
      display: flex;
      gap: 8px;
      padding: 12px 20px;
      border-top: 1px solid var(--border-light);
      margin-top: 4px;
    }
    .settings-add input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid var(--border);
      border-radius: 7px;
      font-size: 13px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border 0.15s;
      color: var(--text-primary);
    }
    .settings-add input:focus { border-color: var(--accent); }
    .settings-add input::placeholder { color: var(--text-muted); }
    .btn-sm {
      padding: 8px 14px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .btn-sm:hover { background: var(--accent-hover); }
    .empty-state {
      text-align: center;
      padding: 32px;
      color: var(--text-muted);
      font-size: 13px;
    }

    /* ── RESERVATION PAGE ── */
    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 28px;
      max-width: 700px;
    }
    .form-section-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 16px;
      margin-top: 24px;
    }
    .form-section-title:first-child { margin-top: 0; }
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    .form-group label {
      font-size: 12.5px;
      color: var(--text-secondary);
      font-weight: 500;
    }
    .form-group input,
    .form-group select {
      padding: 9px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: 13.5px;
      font-family: 'DM Sans', sans-serif;
      outline: none;
      transition: border 0.15s;
      background: var(--surface);
      color: var(--text-primary);
    }
    .form-group input:focus,
    .form-group select:focus { border-color: var(--accent); }
    .form-group input::placeholder { color: var(--text-muted); }
    .form-divider {
      border: none;
      border-top: 1px solid var(--border-light);
      margin: 20px 0 0;
    }
    .form-actions {
      margin-top: 20px;
      display: flex;
      gap: 10px;
    }
    .btn-outline {
      padding: 9px 16px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--surface);
      font-size: 13px;
      font-weight: 500;
      font-family: 'DM Sans', sans-serif;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-outline:hover { border-color: var(--accent); color: var(--text-primary); }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--accent);
      color: #fff;
      padding: 11px 18px;
      border-radius: 9px;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transform: translateY(8px);
      transition: all 0.25s;
      z-index: 999;
      box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    }
    .toast.show { opacity: 1; transform: translateY(0); }

    /* ── SCROLLBAR ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
  </style>
</head>
<body>

<!-- ── SIDEBAR ── -->
<aside class="sidebar">
  <div class="sidebar-logo">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
      <polyline points="9 22 9 12 15 12 15 22"/>
    </svg>
  </div>

  <button class="nav-item" onclick="showPage('reservation', this)" title="">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
      <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
    </svg>
    <span class="tooltip">Reservation</span>
  </button>

  <button class="nav-item active" onclick="showPage('database', this)" title="">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/>
    </svg>
    <span class="tooltip">Database</span>
  </button>

  <button class="nav-item" onclick="showPage('settings', this)" title="">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
    </svg>
    <span class="tooltip">Settings</span>
  </button>

  <div class="sidebar-spacer"></div>
</aside>

<!-- ── MAIN ── -->
<div class="main">

  <!-- TOPBAR -->
  <div class="topbar" id="topbar">
    <div>
      <div class="topbar-title" id="topbar-title">Database</div>
      <div class="topbar-subtitle" id="topbar-subtitle">All reservations</div>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="content">

    <!-- DATABASE PAGE -->
    <div class="page active" id="page-database">
      <div class="toolbar">
        <div class="search-box">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="db-search" placeholder="Search reservations..." oninput="filterTable()" />
        </div>
        <button class="filter-btn" onclick="filterByStatus('all')" id="filter-all">
          All
        </button>
        <button class="filter-btn" onclick="filterByStatus('New Reservation')" id="filter-new">
          <span style="width:7px;height:7px;border-radius:50%;background:#10b981;display:inline-block"></span> Active
        </button>
        <button class="filter-btn" onclick="filterByStatus('Cancelled')" id="filter-cancelled">
          <span style="width:7px;height:7px;border-radius:50%;background:#ef4444;display:inline-block"></span> Cancelled
        </button>
        <div class="toolbar-spacer"></div>
        <button class="btn-primary" onclick="showPage('reservation', document.querySelector('.nav-item'))">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          New Reservation
        </button>
      </div>

      <div class="table-card">
        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Conf. No.</th>
                <th>Created</th>
                <th>Status</th>
                <th>Guest Name</th>
                <th>Arrival</th>
                <th>Departure</th>
                <th>Rate</th>
                <th>Country</th>
                <th>Channel</th>
                <th>Room</th>
                <th>Arr. Month</th>
                <th>Nights</th>
                <th>Revenue</th>
              </tr>
            </thead>
            <tbody id="reservation-table-body">
              <tr><td colspan="13" class="empty-state">No reservations yet</td></tr>
            </tbody>
          </table>
        </div>
        <div class="table-footer">
          <span id="table-count">0 reservations</span>
          <div class="pagination" id="pagination"></div>
        </div>
      </div>
    </div>

    <!-- RESERVATION PAGE -->
    <div class="page" id="page-reservation">
      <div class="form-card">
        <div class="form-section-title">Guest Information</div>
        <div class="form-grid">
          <div class="form-group">
            <label>Guest Name</label>
            <input type="text" id="guest-name" placeholder="Enter guest name" />
          </div>
          <div class="form-group">
            <label>Country</label>
            <input type="text" id="country" placeholder="Enter country" />
          </div>
        </div>

        <div class="form-section-title" style="margin-top:20px">Stay Details</div>
        <div class="form-grid">
          <div class="form-group">
            <label>Arrival Date</label>
            <input type="date" id="arrival-date" />
          </div>
          <div class="form-group">
            <label>Departure Date</label>
            <input type="date" id="departure-date" />
          </div>
          <div class="form-group">
            <label>Rate (per night)</label>
            <input type="number" id="rate" placeholder="0.00" />
          </div>
          <div class="form-group">
            <label>Channel</label>
            <select id="channel-select">
              <option value="">Select channel...</option>
            </select>
          </div>
          <div class="form-group">
            <label>Room</label>
            <select id="room-select">
              <option value="">Select room...</option>
            </select>
          </div>
        </div>

        <hr class="form-divider" />
        <div class="form-actions">
          <button class="btn-primary" onclick="saveReservation()">Save Reservation</button>
          <button class="btn-outline" onclick="clearForm()">Clear</button>
        </div>
      </div>
    </div>

    <!-- SETTINGS PAGE -->
    <div class="page" id="page-settings">
      <div class="settings-grid">
        <div class="settings-card">
          <div class="settings-card-header">
            <h3>Channels</h3>
            <span style="font-size:12px;color:var(--text-muted)" id="channel-count">–</span>
          </div>
          <div class="settings-card-body">
            <div id="channel-list"></div>
          </div>
          <div class="settings-add">
            <input type="text" id="new-channel" placeholder="Add new channel..." onkeydown="if(event.key==='Enter') addChannel()" />
            <button class="btn-sm" onclick="addChannel()">Add</button>
          </div>
        </div>

        <div class="settings-card">
          <div class="settings-card-header">
            <h3>Room Names</h3>
            <span style="font-size:12px;color:var(--text-muted)" id="room-count">–</span>
          </div>
          <div class="settings-card-body">
            <div id="room-list"></div>
          </div>
          <div class="settings-add">
            <input type="text" id="new-room" placeholder="Add new room..." onkeydown="if(event.key==='Enter') addRoom()" />
            <button class="btn-sm" onclick="addRoom()">Add</button>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /content -->
</div><!-- /main -->

<div class="toast" id="toast"></div>

<script>
  // ── SUPABASE CONFIG ──────────────────────────────────────────
  const SUPABASE_URL = 'https://qhyrdlaeeruyireocfbl.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFoeXJkbGFlZXJ1eWlyZW9jZmJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1MzExNjEsImV4cCI6MjA5MDEwNzE2MX0.QG_6ZV0p51pejAZMbX1gcKbov43jRxDthki2abMMpNs';
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // ── STATE ────────────────────────────────────────────────────
  let allReservations = [];
  let currentFilter = 'all';
  let currentPage = 1;
  const rowsPerPage = 10;

  // ── NAVIGATION ───────────────────────────────────────────────
  const pageTitles = {
    database: { title: 'Database', subtitle: 'All reservations' },
    reservation: { title: 'New Reservation', subtitle: 'Create a new booking' },
    settings: { title: 'Settings', subtitle: 'Manage channels and rooms' }
  };

  function showPage(page, clickedBtn) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));
    document.getElementById('page-' + page).classList.add('active');
    if (clickedBtn) clickedBtn.classList.add('active');

    const info = pageTitles[page];
    document.getElementById('topbar-title').textContent = info.title;
    document.getElementById('topbar-subtitle').textContent = info.subtitle;

    if (page === 'reservation') loadDropdowns();
    if (page === 'database') loadReservations();
    if (page === 'settings') { loadChannels(); loadRooms(); }
  }

  // ── TOAST ────────────────────────────────────────────────────
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
  }

  // ── SETTINGS: CHANNELS ───────────────────────────────────────
  async function loadChannels() {
    const { data } = await db.from('channels').select('*').order('created_at');
    const list = document.getElementById('channel-list');
    const count = document.getElementById('channel-count');
    list.innerHTML = '';
    if (!data || data.length === 0) {
      list.innerHTML = '<p class="empty-state">No channels yet</p>';
      count.textContent = '0 items';
      return;
    }
    count.textContent = data.length + ' item' + (data.length !== 1 ? 's' : '');
    data.forEach(ch => {
      list.innerHTML += `
        <div class="settings-item">
          <span>${ch.name}</span>
          <button class="remove-btn" onclick="removeChannel('${ch.id}')">✕</button>
        </div>`;
    });
  }

  async function addChannel() {
    const input = document.getElementById('new-channel');
    const name = input.value.trim();
    if (!name) return showToast('Please enter a channel name');
    const { error } = await db.from('channels').insert({ name });
    if (error) return showToast('Error adding channel');
    input.value = '';
    loadChannels();
    showToast('Channel added ✓');
  }

  async function removeChannel(id) {
    await db.from('channels').delete().eq('id', id);
    loadChannels();
    showToast('Channel removed');
  }

  // ── SETTINGS: ROOMS ──────────────────────────────────────────
  async function loadRooms() {
    const { data } = await db.from('rooms').select('*').order('created_at');
    const list = document.getElementById('room-list');
    const count = document.getElementById('room-count');
    list.innerHTML = '';
    if (!data || data.length === 0) {
      list.innerHTML = '<p class="empty-state">No rooms yet</p>';
      count.textContent = '0 items';
      return;
    }
    count.textContent = data.length + ' item' + (data.length !== 1 ? 's' : '');
    data.forEach(r => {
      list.innerHTML += `
        <div class="settings-item">
          <span>${r.name}</span>
          <button class="remove-btn" onclick="removeRoom('${r.id}')">✕</button>
        </div>`;
    });
  }

  async function addRoom() {
    const input = document.getElementById('new-room');
    const name = input.value.trim();
    if (!name) return showToast('Please enter a room name');
    const { error } = await db.from('rooms').insert({ name });
    if (error) return showToast('Error adding room');
    input.value = '';
    loadRooms();
    showToast('Room added ✓');
  }

  async function removeRoom(id) {
    await db.from('rooms').delete().eq('id', id);
    loadRooms();
    showToast('Room removed');
  }

  // ── RESERVATION: DROPDOWNS ───────────────────────────────────
  async function loadDropdowns() {
    const { data: channels } = await db.from('channels').select('*').order('created_at');
    const { data: rooms } = await db.from('rooms').select('*').order('created_at');
    const chSel = document.getElementById('channel-select');
    chSel.innerHTML = '<option value="">Select channel...</option>';
    channels?.forEach(c => chSel.innerHTML += `<option value="${c.name}">${c.name}</option>`);
    const rmSel = document.getElementById('room-select');
    rmSel.innerHTML = '<option value="">Select room...</option>';
    rooms?.forEach(r => rmSel.innerHTML += `<option value="${r.name}">${r.name}</option>`);
  }

  // ── RESERVATION: SAVE ────────────────────────────────────────
  function generateConfNumber() {
    const date = new Date().toISOString().slice(0, 10).replace(/-/g, '');
    const letters = Array.from({length: 3}, () =>
      String.fromCharCode(65 + Math.floor(Math.random() * 26))).join('');
    return date + letters;
  }

  async function saveReservation() {
    const guestName     = document.getElementById('guest-name').value.trim();
    const arrivalDate   = document.getElementById('arrival-date').value;
    const departureDate = document.getElementById('departure-date').value;
    const rate          = parseFloat(document.getElementById('rate').value);
    const country       = document.getElementById('country').value.trim();
    const channel       = document.getElementById('channel-select').value;
    const roomName      = document.getElementById('room-select').value;

    if (!guestName || !arrivalDate || !departureDate || !rate || !channel || !roomName)
      return showToast('Please fill in all required fields');
    if (departureDate <= arrivalDate)
      return showToast('Departure must be after arrival');

    const arrival     = new Date(arrivalDate);
    const departure   = new Date(departureDate);
    const roomNight   = Math.round((departure - arrival) / (1000 * 60 * 60 * 24));
    const roomRevenue = roomNight * rate;
    const arrivalMonth = arrival.toLocaleString('default', { month: 'long', year: 'numeric' });

    let confNumber, exists = true;
    while (exists) {
      confNumber = generateConfNumber();
      const { data } = await db.from('reservations').select('id').eq('confirmation_number', confNumber);
      exists = data && data.length > 0;
    }

    const { error } = await db.from('reservations').insert({
      confirmation_number: confNumber,
      guest_name: guestName,
      arrival_date: arrivalDate,
      departure_date: departureDate,
      rate, country, channel,
      room_name: roomName,
      arrival_month: arrivalMonth,
      room_night: roomNight,
      room_revenue: roomRevenue,
      status: 'New Reservation'
    });

    if (error) return showToast('Error saving reservation');
    showToast(`Saved! Conf: ${confNumber} ✓`);
    clearForm();
  }

  function clearForm() {
    ['guest-name','arrival-date','departure-date','rate','country'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('channel-select').value = '';
    document.getElementById('room-select').value = '';
  }

  // ── DATABASE ─────────────────────────────────────────────────
  async function loadReservations() {
    const { data } = await db.from('reservations').select('*').order('created_date', { ascending: false });
    allReservations = data || [];
    currentPage = 1;
    renderTable();
  }

  function filterByStatus(status) {
    currentFilter = status;
    currentPage = 1;
    document.querySelectorAll('.filter-btn').forEach(b => b.style.fontWeight = '');
    const map = { all: 'filter-all', 'New Reservation': 'filter-new', Cancelled: 'filter-cancelled' };
    if (map[status]) document.getElementById(map[status]).style.fontWeight = '600';
    renderTable();
  }

  function filterTable() { currentPage = 1; renderTable(); }

  function renderTable() {
    const search = document.getElementById('db-search').value.toLowerCase();
    let filtered = allReservations;

    if (currentFilter !== 'all')
      filtered = filtered.filter(r => r.status === currentFilter);

    if (search)
      filtered = filtered.filter(r =>
        [r.guest_name, r.confirmation_number, r.country, r.channel, r.room_name]
          .some(v => v && v.toLowerCase().includes(search))
      );

    const total = filtered.length;
    const totalPages = Math.max(1, Math.ceil(total / rowsPerPage));
    const start = (currentPage - 1) * rowsPerPage;
    const pageData = filtered.slice(start, start + rowsPerPage);

    const tbody = document.getElementById('reservation-table-body');
    if (pageData.length === 0) {
      tbody.innerHTML = '<tr><td colspan="13" class="empty-state">No reservations found</td></tr>';
    } else {
      tbody.innerHTML = pageData.map(r => `
        <tr>
          <td class="mono">${r.confirmation_number}</td>
          <td>${r.created_date || '-'}</td>
          <td>
            <select class="status-select status-pill ${r.status === 'Cancelled' ? 'status-cancelled' : 'status-new'}"
              onchange="updateStatus('${r.id}', this.value, this)">
              <option ${r.status === 'New Reservation' ? 'selected' : ''}>New Reservation</option>
              <option ${r.status === 'Cancelled' ? 'selected' : ''}>Cancelled</option>
            </select>
          </td>
          <td style="font-weight:500">${r.guest_name}</td>
          <td>${r.arrival_date}</td>
          <td>${r.departure_date}</td>
          <td style="font-family:'DM Mono',monospace;font-size:12px">${Number(r.rate).toLocaleString()}</td>
          <td>${r.country || '–'}</td>
          <td>${r.channel}</td>
          <td>${r.room_name}</td>
          <td>${r.arrival_month}</td>
          <td style="text-align:center">${r.room_night}</td>
          <td style="font-family:'DM Mono',monospace;font-size:12px;font-weight:500">${Number(r.room_revenue).toLocaleString()}</td>
        </tr>`).join('');
    }

    document.getElementById('table-count').textContent =
      total + ' reservation' + (total !== 1 ? 's' : '');

    // Pagination
    const pag = document.getElementById('pagination');
    pag.innerHTML = '';
    if (totalPages <= 1) return;

    const addBtn = (label, page, disabled, active) => {
      const btn = document.createElement('button');
      btn.className = 'page-btn' + (active ? ' active' : '');
      btn.textContent = label;
      btn.disabled = disabled;
      if (!disabled) btn.onclick = () => { currentPage = page; renderTable(); };
      pag.appendChild(btn);
    };

    addBtn('‹', currentPage - 1, currentPage === 1, false);
    for (let i = 1; i <= totalPages; i++) {
      if (i === 1 || i === totalPages || Math.abs(i - currentPage) <= 1)
        addBtn(i, i, false, i === currentPage);
      else if (Math.abs(i - currentPage) === 2) {
        const dots = document.createElement('span');
        dots.textContent = '…';
        dots.style.cssText = 'padding:0 4px;color:var(--text-muted);font-size:12px';
        pag.appendChild(dots);
      }
    }
    addBtn('›', currentPage + 1, currentPage === totalPages, false);
  }

  async function updateStatus(id, newStatus, selectEl) {
    await db.from('reservations').update({ status: newStatus }).eq('id', id);
    selectEl.className = `status-select status-pill ${newStatus === 'Cancelled' ? 'status-cancelled' : 'status-new'}`;
    // Update local data too
    const r = allReservations.find(x => x.id === id);
    if (r) r.status = newStatus;
    showToast('Status updated ✓');
  }

  // ── INIT ─────────────────────────────────────────────────────
  loadReservations();
</script>
</body>
</html>
